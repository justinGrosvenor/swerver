name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Build
        run: zig build

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Test
        run: zig build test
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache-global
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache
