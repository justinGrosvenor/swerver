name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin the exact Zig dev build we target. Must match the
# minimum_zig_version field in build.zig.zon and the comment in
# MEMORY.md. Bump both together.
env:
  ZIG_VERSION: "0.16.0"

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Install OpenSSL headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev zlib1g-dev
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Check (compile exe + examples + all test variants, no run)
        run: zig build check --summary all
      - name: Build (Debug)
        run: zig build --summary all
      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast --summary all
      - name: Test (all feature-flag variants)
        run: zig build test-matrix --summary all
      # WASM edge functions are gated behind -Denable-wasm (off by default), so
      # the steps above never compile src/wasm, vendor/wasm3, or the
      # if (build_options.enable_wasm) integration blocks in
      # router.zig/server.zig/proxy.zig. Compile them here (catches signature
      # drift vs middleware.Decision / RequestView / ProxyRoute) and run the
      # security suite (fuel trap, memory cap, ABI fuzz, fail-closed).
      - name: WASM edge functions check + test (-Denable-wasm)
        run: |
          zig build check -Denable-wasm=true --summary all
          zig build test -Denable-wasm=true --summary all
      # H2 per-stream filter park (E2a) is gated on BOTH -Denable-wasm and
      # -Denable-http2; the step above (wasm only) skips those tests. Run the
      # combination so the H2 park/resume + RST-cancel tests actually execute.
      - name: WASM + HTTP/2 check + test (-Denable-wasm -Denable-http2)
        run: |
          zig build check -Denable-wasm=true -Denable-http2=true --summary all
          zig build test -Denable-wasm=true -Denable-http2=true --summary all

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Check (compile exe + examples + all test variants, no run)
        run: zig build check --summary all
      - name: Build (Debug)
        run: zig build --summary all
      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast --summary all
      - name: Test (all feature-flag variants)
        run: zig build test-matrix --summary all
      # Same wasm coverage as Linux; macOS additionally exercises the
      # vendor/wasm3/shim/endian.h path that @cImport translate-c needs here.
      - name: WASM edge functions check + test (-Denable-wasm)
        run: |
          zig build check -Denable-wasm=true --summary all
          zig build test -Denable-wasm=true --summary all
      - name: WASM + HTTP/2 check + test (-Denable-wasm -Denable-http2)
        run: |
          zig build check -Denable-wasm=true -Denable-http2=true --summary all
          zig build test -Denable-wasm=true -Denable-http2=true --summary all

  # H3 + WASM is the one combination the stock runners cannot cover. The E2b
  # park tests (src/server/http3.zig, gated on -Denable-http3 AND -Denable-wasm)
  # link the QUIC TLS symbols SSL_set_quic_tls_cbs / _transport_params /
  # _early_data_enabled, which only exist in OpenSSL 3.5+. ubuntu-latest ships
  # OpenSSL 3.0, so even `zig build check` of that combo fails to link there and
  # those tests would run local-only. Build inside a Debian trixie image (ships
  # OpenSSL 3.5.x) so the H3+wasm tests both COMPILE and RUN on Linux in CI.
  test-h3-wasm-container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      # The image carries OpenSSL 3.5+ and Zig ${{ env.ZIG_VERSION }} (pinned in
      # the Dockerfile to match env.ZIG_VERSION above and build.zig.zon).
      - name: Build H3 + OpenSSL 3.5 image
        run: docker build -f .github/docker/h3-openssl35.Dockerfile -t swerver-h3-openssl35 .
      # check links the H3+wasm test binaries (the QUIC TLS symbols resolve here),
      # then test actually RUNS the E2b park/resume + frame-encoding tests. The
      # repo is bind-mounted so zig's cache lands in the workspace. seccomp is
      # unconfined because Docker's default profile blocks io_uring syscalls
      # (see MEMORY.md docker_seccomp_iouring), which the native paths may touch.
      - name: H3 + WASM check + test (-Denable-tls -Denable-http3 -Denable-wasm)
        run: |
          docker run --rm --security-opt seccomp=unconfined \
            -v "$PWD":/work -w /work swerver-h3-openssl35 \
            sh -c "zig build check -Denable-tls=true -Denable-http3=true -Denable-wasm=true --summary all && zig build test -Denable-tls=true -Denable-http3=true -Denable-wasm=true --summary all"

  cross-compile-linux:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Cross-compile for Linux (Debug)
        run: zig build -Dtarget=x86_64-linux-musl --summary all
      - name: Cross-compile for Linux (ReleaseFast)
        run: zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseFast --summary all
      # Proves vendored wasm3 (C) cross-compiles into a single static binary,
      # the load-bearing claim behind choosing wasm3 over a JIT.
      - name: Cross-compile with WASM edge functions (static musl)
        run: zig build -Dtarget=x86_64-linux-musl -Denable-wasm=true -Doptimize=ReleaseFast --summary all
