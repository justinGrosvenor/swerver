name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Verify checkout
        run: |
          git rev-parse HEAD
          if command -v rg >/dev/null 2>&1; then
            rg -n "const prot" src/runtime/backend/io_uring.zig
          else
            grep -n "const prot" src/runtime/backend/io_uring.zig
          fi
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Build
        run: zig build --summary all
      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast --summary all
      - name: Test
        run: zig build test --summary all

  cross-compile-linux:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Verify checkout
        run: |
          git rev-parse HEAD
          if command -v rg >/dev/null 2>&1; then
            rg -n "const prot" src/runtime/backend/io_uring.zig
          else
            grep -n "const prot" src/runtime/backend/io_uring.zig
          fi
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Cross-compile for Linux
        run: zig build -Dtarget=x86_64-linux-musl --summary all
      - name: Cross-compile for Linux (ReleaseFast)
        run: zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseFast --summary all
