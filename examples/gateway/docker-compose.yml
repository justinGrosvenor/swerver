# Runs mock backends so you can test the gateway without Python.
#
# Usage:
#   docker compose -f examples/gateway/docker-compose.yml up -d
#   zig build && ./zig-out/bin/swerver --config examples/gateway/config.json
#   curl -H "X-API-Key: demo-key-1" http://localhost:8080/api/v1/health
#   docker compose -f examples/gateway/docker-compose.yml down

services:
  api-v1-a:
    image: nginx:alpine
    volumes:
      - ./backends/api-v1-a.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9001:80"

  api-v1-b:
    image: nginx:alpine
    volumes:
      - ./backends/api-v1-b.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9002:80"

  api-v2:
    image: nginx:alpine
    volumes:
      - ./backends/api-v2.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9003:80"
